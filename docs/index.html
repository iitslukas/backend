<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #07070f;
      --s1:      rgba(255,255,255,0.025);
      --s2:      rgba(255,255,255,0.05);
      --border:  rgba(255,255,255,0.07);
      --blit:    rgba(167,139,250,0.35);
      --v:       #a78bfa;
      --i:       #818cf8;
      --glow:    rgba(167,139,250,0.22);
      --text:    #ede8ff;
      --muted:   #7b73a8;
      --dim:     #3e3868;
      --green:   #4ade80;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ── AURORA BACKGROUND ── */
    .orb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
      filter: blur(90px);
    }
    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(167,139,250,0.13) 0%, transparent 70%);
      top: -250px; left: -180px;
      animation: drift1 22s ease-in-out infinite;
    }
    .orb-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.11) 0%, transparent 70%);
      bottom: -150px; right: -120px;
      animation: drift2 28s ease-in-out infinite;
    }
    .orb-3 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(244,114,182,0.07) 0%, transparent 70%);
      top: 35%; right: 8%;
      animation: drift3 18s ease-in-out infinite;
    }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      text-align: center;
      padding: 90px 20px 56px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: 99px;
      padding: 7px 18px;
      font-size: 12px; font-weight: 500;
      color: var(--v);
      letter-spacing: 0.6px; text-transform: uppercase;
      margin-bottom: 28px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: var(--green); border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: clamp(42px, 7vw, 76px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1.05;
      margin-bottom: 18px;
      background: linear-gradient(140deg, #fff 20%, #c4b5fd 60%, var(--v) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub { color: var(--muted); font-size: 16px; line-height: 1.6; }

    /* ── CONTROLS ── */
    .controls {
      display: flex; flex-direction: column; align-items: center;
      gap: 20px; padding: 0 20px; margin-bottom: 48px;
      position: relative; z-index: 50;
    }
    .search-row {
      display: flex; gap: 10px;
      width: 100%; max-width: 600px;
      align-items: stretch;
    }
    .search-wrap { flex: 1; min-width: 0; }
    .search-box {
      position: relative;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(16px);
      transition: border-color .2s, box-shadow .2s;
    }
    .search-box:focus-within {
      border-color: rgba(167,139,250,0.45);
      box-shadow: 0 0 0 4px rgba(167,139,250,0.1);
    }
    .si {
      position: absolute; left: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--dim); font-size: 16px; pointer-events: none;
    }
    #searchBar {
      width: 100%; padding: 16px 20px 16px 50px;
      font-size: 15px; font-family: 'Inter', sans-serif;
      background: transparent; border: none; outline: none; color: var(--text);
    }
    #searchBar::placeholder { color: var(--dim); }

    /* Sort */
    .sort-wrap { position: relative; flex-shrink: 0; }
    .sort-btn {
      display: flex; align-items: center; gap: 8px;
      height: 100%; padding: 0 18px;
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 16px; backdrop-filter: blur(16px);
      font-size: 14px; font-weight: 500; color: var(--muted);
      font-family: 'Inter', sans-serif; cursor: pointer; white-space: nowrap;
      transition: border-color .2s, background .2s, color .2s;
    }
    .sort-btn:hover, .sort-btn.open {
      border-color: rgba(167,139,250,.45); color: var(--text); background: var(--s2);
    }
    .sort-arrow { font-size: 11px; color: var(--dim); transition: transform .2s; }
    .sort-btn.open .sort-arrow { transform: rotate(180deg); }

    .sort-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: #0d0d1c; border: 1px solid var(--border);
      border-radius: 14px; padding: 6px; min-width: 210px;
      z-index: 100; box-shadow: 0 20px 60px rgba(0,0,0,.7);
      animation: slideDown .2s cubic-bezier(.16,1,.3,1);
    }
    .sort-dropdown.hidden { display: none; }
    .sort-hd {
      padding: 6px 12px 3px;
      font-size: 10px; font-weight: 600;
      color: var(--dim); letter-spacing: .8px; text-transform: uppercase;
    }
    .sort-sep { height: 1px; background: var(--border); margin: 5px 4px; }
    .sort-opt {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; padding: 9px 12px; border-radius: 9px; border: none;
      background: transparent; color: var(--muted);
      font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; text-align: left;
      transition: background .15s, color .15s;
    }
    .sort-opt:hover { background: var(--s2); color: var(--text); }
    .sort-opt.active { color: var(--v); background: rgba(167,139,250,.1); }
    .sort-opt.active::after { content: "✓"; font-size: 11px; }

    .stats-bar { display: flex; gap: 12px; }
    .stat-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 99px; padding: 8px 18px;
      font-size: 13px; color: var(--muted);
    }
    .stat-pill strong { color: var(--text); font-weight: 600; }

    /* ── GRID ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(268px, 1fr));
      gap: 18px;
      padding: 0 40px 20px;
      max-width: 1300px; margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* ── CARD ── */
    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px 22px 20px;
      cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      position: relative; overflow: hidden;
      transition: transform .35s cubic-bezier(.2,.8,.2,1),
                  border-color .3s, box-shadow .3s;
      backdrop-filter: blur(16px);
      animation: cardIn .45s cubic-bezier(.16,1,.3,1) both;
    }
    /* top shimmer line */
    .card::after {
      content: "";
      position: absolute; top: 0;
      left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,.7), transparent);
      opacity: 0; transition: opacity .3s;
    }
    .card:hover { transform: translateY(-8px); border-color: rgba(167,139,250,.25); box-shadow: 0 24px 64px rgba(0,0,0,.55), 0 0 40px rgba(167,139,250,.1); }
    .card:hover::after, .card.open::after { opacity: 1; }
    .card.open { border-color: rgba(167,139,250,.3); box-shadow: 0 0 0 1px rgba(167,139,250,.2), 0 16px 48px rgba(167,139,250,.12); }

    /* Avatar */
    .av-ring {
      width: 92px; height: 92px; border-radius: 50%;
      padding: 2.5px;
      background: linear-gradient(135deg, rgba(167,139,250,.35) 0%, rgba(129,140,248,.35) 100%);
      margin-bottom: 16px;
      position: relative;
      transition: background .3s, box-shadow .3s;
    }
    .card:hover .av-ring, .card.open .av-ring {
      background: linear-gradient(135deg, var(--v), var(--i));
      box-shadow: 0 0 32px rgba(167,139,250,.4);
    }
    .av-ring img {
      width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
      border: 2.5px solid var(--bg);
      display: block;
      transition: transform .3s;
    }
    .card:hover .av-ring img { transform: scale(1.04); }
    .av-id {
      position: absolute; bottom: -1px; right: -1px;
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, var(--v), var(--i));
      border: 2.5px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; color: #fff;
    }

    .card-name {
      font-size: 17px; font-weight: 700; letter-spacing: -.3px;
      margin-bottom: 8px; text-align: center;
    }
    .role-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(167,139,250,.1);
      border: 1px solid rgba(167,139,250,.18);
      border-radius: 99px;
      padding: 4px 13px;
      font-size: 11px; font-weight: 500;
      color: var(--v); letter-spacing: .3px;
    }

    /* Expand */
    .card-expand {
      width: 100%; max-height: 0; opacity: 0; overflow: hidden;
      transition: max-height .4s cubic-bezier(.2,.8,.2,1), opacity .3s, margin-top .3s;
    }
    .card.open .card-expand { max-height: 160px; opacity: 1; margin-top: 20px; }
    .exp-inner { border-top: 1px solid var(--border); padding-top: 16px; }
    .drow {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--muted);
      margin-bottom: 10px; padding: 0 2px;
    }
    .drow strong { color: var(--text); font-weight: 600; }

    /* Footer / chat btn */
    .card-foot { width: 100%; margin-top: auto; padding-top: 16px; }
    .chat-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 12px 18px;
      border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--v), var(--i));
      color: #fff; font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; text-decoration: none;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 22px rgba(167,139,250,.32);
    }
    .chat-btn:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(167,139,250,.5); }
    .chat-btn:active { transform: translateY(1px); }

    /* ── SKELETON ── */
    .sk-card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 22px; padding: 28px 22px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .sk {
      border-radius: 6px;
      background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.09) 50%, rgba(255,255,255,.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.8s infinite;
    }
    .sk-av  { width: 92px; height: 92px; border-radius: 50%; }
    .sk-nm  { width: 130px; height: 20px; }
    .sk-rl  { width: 76px; height: 28px; border-radius: 99px; }
    .sk-btn { width: 100%; height: 46px; border-radius: 12px; margin-top: 4px; }

    /* ── EMPTY & ERROR ── */
    .empty-state, .error-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 12px; padding: 60px 20px; grid-column: 1/-1;
      color: var(--muted); font-size: 15px; text-align: center;
    }
    .empty-icon, .error-icon { font-size: 48px; }
    .error-title { font-size: 17px; font-weight: 600; color: var(--text); }
    .error-msg { font-size: 13px; color: var(--muted); max-width: 300px; }
    .retry-btn {
      margin-top: 8px; padding: 10px 24px; border-radius: 10px; border: none;
      background: var(--s2); border: 1px solid var(--border);
      color: var(--text); font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background .2s;
    }
    .retry-btn:hover { background: rgba(167,139,250,.15); border-color: var(--blit); }

    /* ── FAB ── */
    .fab {
      position: fixed; bottom: 28px; right: 28px;
      background: linear-gradient(135deg, var(--v), var(--i));
      color: #fff; border-radius: 16px;
      padding: 14px 24px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      box-shadow: 0 8px 32px rgba(167,139,250,.5);
      text-decoration: none;
      display: flex; align-items: center; gap: 8px;
      transition: transform .25s cubic-bezier(.2,.8,.2,1.3), box-shadow .25s;
      z-index: 999;
    }
    .fab:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 16px 48px rgba(167,139,250,.65); }

    footer {
      text-align: center; padding: 48px 20px 20px;
      font-size: 12px; color: var(--dim);
      letter-spacing: 1.2px; text-transform: uppercase;
      position: relative; z-index: 1;
    }

    /* ── ANIMATIONS ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes drift1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(70px,50px); } }
    @keyframes drift2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-55px,-45px); } }
    @keyframes drift3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(35px,-55px); } }
    @keyframes pulse  { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      #grid { grid-template-columns: 1fr; padding: 0 16px; }
      h1    { letter-spacing: -2px; }
      .fab  { bottom: 20px; right: 16px; padding: 12px 18px; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <section class="hero">
    <div class="badge"><span class="badge-dot"></span> Live · Student Gallery</div>
    <h1>Zoznam Študentov</h1>
    <p class="sub">Klikni na kartu pre viac detailov &nbsp;·&nbsp; Chatuj s AI asistentom</p>
  </section>

  <div class="controls">
    <div class="search-row">
      <div class="search-wrap">
        <div class="search-box">
          <span class="si">🔍</span>
          <input id="searchBar" type="text" placeholder="Hľadaj podľa mena…" autocomplete="off" />
        </div>
      </div>
      <div class="sort-wrap">
        <button class="sort-btn" id="sortBtn">
          <span id="sortLabel">ID ↑</span>
          <span class="sort-arrow">▾</span>
        </button>
        <div class="sort-dropdown hidden" id="sortDropdown">
          <div class="sort-hd">Podľa ID</div>
          <button class="sort-opt active" data-sort="id_asc"      data-label="ID ↑">ID (1 → 10)</button>
          <button class="sort-opt"        data-sort="id_desc"     data-label="ID ↓">ID (10 → 1)</button>
          <div class="sort-sep"></div>
          <div class="sort-hd">Abecedne</div>
          <button class="sort-opt" data-sort="name_asc"     data-label="Meno A→Z">Meno (A → Z)</button>
          <button class="sort-opt" data-sort="name_desc"    data-label="Meno Z→A">Meno (Z → A)</button>
          <button class="sort-opt" data-sort="surname_asc"  data-label="Priezvisko A→Z">Priezvisko (A → Z)</button>
          <button class="sort-opt" data-sort="surname_desc" data-label="Priezvisko Z→A">Priezvisko (Z → A)</button>
          <div class="sort-sep"></div>
          <div class="sort-hd">Podľa veku</div>
          <button class="sort-opt" data-sort="age_asc"  data-label="Vek ↑">Vek (mladší → starší)</button>
          <button class="sort-opt" data-sort="age_desc" data-label="Vek ↓">Vek (starší → mladší)</button>
        </div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat-pill">Celkom &nbsp;<strong id="totalCount">—</strong></div>
      <div class="stat-pill">Zobrazených &nbsp;<strong id="visibleCount">—</strong></div>
    </div>
  </div>

  <div id="grid"></div>

  <footer>Student Gallery &nbsp;·&nbsp; 2026</footer>
  <a class="fab" href="/chat">✨ AI Chat</a>

  <script>
    const grid         = document.getElementById('grid');
    const searchBar    = document.getElementById('searchBar');
    const totalCount   = document.getElementById('totalCount');
    const visibleCount = document.getElementById('visibleCount');
    const sortBtn      = document.getElementById('sortBtn');
    const sortDropdown = document.getElementById('sortDropdown');
    const sortLabel    = document.getElementById('sortLabel');

    let all = [];

    /* ── Render cards ── */
    function render(students) {
      grid.innerHTML = '';
      if (!students.length) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <div>Žiadny výsledok pre "<strong>${searchBar.value}</strong>"</div>
          </div>`;
        return;
      }
      students.forEach((s, idx) => {
        const params = new URLSearchParams({ meno: s.meno, priezvisko: s.priezvisko, image: s.image });
        const c = document.createElement('div');
        c.className = 'card';
        c.style.animationDelay = `${idx * 55}ms`;
        c.innerHTML = `
          <div class="av-ring">
            <img src="${s.image}" alt="${s.meno}" loading="lazy">
            <div class="av-id">#${s.id}</div>
          </div>
          <div class="card-name">${s.meno} ${s.priezvisko}</div>
          <div class="role-pill">✦ Študent</div>
          <div class="card-expand">
            <div class="exp-inner">
              <div class="drow"><span>Meno</span><strong>${s.meno}</strong></div>
              <div class="drow"><span>Priezvisko</span><strong>${s.priezvisko}</strong></div>
              ${s.vek != null ? `<div class="drow"><span>Vek</span><strong>${s.vek} rokov</strong></div>` : ''}
              <div class="drow"><span>ID</span><strong>#${s.id}</strong></div>
            </div>
          </div>
          <div class="card-foot">
            <a class="chat-btn" href="/chat?${params}">💬 Chatovať so študentom</a>
          </div>`;
        c.addEventListener('click', e => {
          if (e.target.closest('a')) return;
          document.querySelectorAll('.card.open').forEach(o => { if (o !== c) o.classList.remove('open'); });
          c.classList.toggle('open');
        });
        grid.appendChild(c);
      });
    }

    /* ── Apply search filter on top of current sorted list ── */
    function applySearch() {
      const q = searchBar.value.toLowerCase().trim();
      const filtered = q ? all.filter(s => `${s.meno} ${s.priezvisko}`.toLowerCase().includes(q)) : all;
      visibleCount.textContent = filtered.length;
      render(filtered);
    }

    /* ── Fetch sorted data from Python backend ── */
    function loadStudents(sort) {
      grid.innerHTML = Array.from({ length: 6 }, () => `
        <div class="sk-card">
          <div class="sk sk-av"></div><div class="sk sk-nm"></div>
          <div class="sk sk-rl"></div><div class="sk sk-btn"></div>
        </div>`).join('');

      fetch(`/api?sort=${sort}`)
        .then(r => { if (!r.ok) throw new Error(`Server vrátil ${r.status}`); return r.json(); })
        .then(data => {
          if (data.error) throw new Error(data.error);
          all = data;
          totalCount.textContent = data.length;
          applySearch();
        })
        .catch(err => {
          totalCount.textContent = visibleCount.textContent = '—';
          grid.innerHTML = `
            <div class="error-state">
              <div class="error-icon">⚠️</div>
              <div class="error-title">Nepodarilo sa načítať študentov</div>
              <div class="error-msg">${err.message}</div>
              <button class="retry-btn" onclick="location.reload()">↺ Skúsiť znova</button>
            </div>`;
        });
    }

    /* ── Sort dropdown ── */
    sortBtn.addEventListener('click', e => {
      e.stopPropagation();
      sortDropdown.classList.toggle('hidden');
      sortBtn.classList.toggle('open');
    });
    document.addEventListener('click', () => {
      sortDropdown.classList.add('hidden');
      sortBtn.classList.remove('open');
    });
    document.querySelectorAll('.sort-opt').forEach(opt => {
      opt.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('.sort-opt').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        sortLabel.textContent = opt.dataset.label;
        sortDropdown.classList.add('hidden');
        sortBtn.classList.remove('open');
        loadStudents(opt.dataset.sort);
      });
    });

    /* ── Search ── */
    searchBar.addEventListener('input', applySearch);

    /* ── Initial load ── */
    loadStudents('id_asc');
  </script>
</body>
</html>
